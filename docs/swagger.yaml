        type: boolean
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  internal_handler.AuthResponse:
    properties:
      csrf_token:
        type: string
      user:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.User'
    type: object
  internal_handler.ConvertLeadRequest:
    properties:
      address:
        type: string
      company_name:
        type: string
      notes:
        type: string
      website:
        type: string
    type: object
  internal_handler.CreateLeadRequest:
    properties:
      company:
        type: string
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      notes:
        type: string
      owner_id:
        type: integer
      phone:
        type: string
      position:
        type: string
      source:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.LeadStatus'
        enum:
        - new
        - contacted
        - qualified
        - unqualified
        - converted
    required:
    - email
    - first_name
    - last_name
    type: object
  internal_handler.CreateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        allOf:
        - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.UserRole'
        enum:
        - admin
        - sales
        - support
        - customer
    required:
    - email
    - first_name
    - last_name
    - password
    - role
    type: object
  internal_handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_handler.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.UserRole'
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  internal_handler.UpdateMeRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
    type: object
  internal_handler.UpdateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      role:
        allOf:
        - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.UserRole'
        enum:
        - admin
        - sales
        - support
        - customer
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a comprehensive CRM API built with Go and Gin framework. It
    provides endpoints for managing users, leads, customers, tasks, tickets, and more.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: GopherCRM API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password, returns JWT tokens
        and CSRF token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_handler.AuthResponse'
              type: object
        "400":
          description: Invalid request data
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "401":
          description: Invalid credentials
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
      summary: User login
      tags:
      - authentication
  /auth/logout:
    post:
      description: Logout user by clearing authentication cookies and revoking refresh
        token
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token from cookie
      produces:
      - application/json
      responses:
        "200":
          description: Tokens refreshed successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_handler.AuthResponse'
              type: object
        "400":
          description: Invalid request data
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "401":
          description: Invalid or expired refresh token
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
      summary: Refresh JWT tokens
      tags:
      - authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account with email, password, and basic information
      parameters:
      - description: Registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_handler.AuthResponse'
              type: object
        "400":
          description: Invalid request data
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "409":
          description: User already exists
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
      summary: Register a new user
      tags:
      - authentication
  /leads:
    post:
      consumes:
      - application/json
      description: Create a new lead (sales and admin roles only)
      parameters:
      - description: Lead creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateLeadRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Lead created successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.Lead'
              type: object
        "400":
          description: Invalid request data
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "403":
          description: Forbidden - Sales or Admin role required
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Create a new lead
      tags:
      - leads
  /leads/{id}/convert:
    post:
      consumes:
      - application/json
      description: Convert a lead to a customer with additional customer information
      parameters:
      - description: Lead ID
        in: path
        name: id
        required: true
        type: integer
      - description: Lead conversion request with customer details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.ConvertLeadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Lead converted to customer successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.Customer'
              type: object
        "400":
          description: Invalid request data
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "403":
          description: Forbidden - Sales or Admin role required
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "404":
          description: Lead not found
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "409":
          description: Lead already converted
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Convert lead to customer
      tags:
      - leads
  /users:
    get:
      description: Get a paginated list of all users (admin only)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search term for email, first name, or last name
        in: query
        name: search
        type: string
      - description: Filter by user role
        enum:
        - admin
        - sales
        - support
        - customer
        in: query
        name: role
        type: string
      - description: Filter by active status
        in: query
        name: is_active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Users retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.User'
                  type: array
              type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            allOf:
            - $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIResponse'
            - properties:
                error:

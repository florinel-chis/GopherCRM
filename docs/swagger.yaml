      assigned_to_id:
        type: integer
      created_at:
        type: string
      customer:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.Customer'
      customer_id:
        type: integer
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      description:
        type: string
      id:
        type: integer
      priority:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.TicketPriority'
      resolution:
        type: string
      status:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.TicketStatus'
      title:
        type: string
      updated_at:
        type: string
    type: object
  github_com_florinel-chis_gophercrm_internal_models.TicketPriority:
    enum:
    - low
    - medium
    - high
    - urgent
    type: string
    x-enum-varnames:
    - TicketPriorityLow
    - TicketPriorityMedium
    - TicketPriorityHigh
    - TicketPriorityUrgent
  github_com_florinel-chis_gophercrm_internal_models.TicketStatus:
    enum:
    - open
    - in_progress
    - resolved
    - closed
    type: string
    x-enum-varnames:
    - TicketStatusOpen
    - TicketStatusInProgress
    - TicketStatusResolved
    - TicketStatusClosed
  github_com_florinel-chis_gophercrm_internal_models.User:
    properties:

    properties:
      address:
        type: string
      city:
        type: string
      company:
        type: string
      country:
        type: string
      created_at:
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      notes:
        type: string
      phone:
        type: string
      position:
        type: string
      postal_code:
        type: string
      state:
        type: string
      tickets:
        items:
          $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.Ticket'
        type: array
      updated_at:
        type: string
      user:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.User'
      user_id:
        type: integer
    type: object
  github_com_florinel-chis_gophercrm_internal_models.Lead:
    properties:
      company:
        type: string
      created_at:
        type: string
      customer:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.Customer'
      customer_id:
        type: integer
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      notes:
        type: string
      owner:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.User'
      owner_id:
        type: integer
      phone:
        type: string
      position:
        type: string
      source:
        type: string
      status:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.LeadStatus'
      updated_at:
        type: string
    type: object
  github_com_florinel-chis_gophercrm_internal_models.LeadStatus:
    enum:
    - new
    - contacted
    - qualified
    - unqualified
    - converted
    type: string
    x-enum-varnames:
    - LeadStatusNew
    - LeadStatusContacted
    - LeadStatusQualified
    - LeadStatusUnqualified
    - LeadStatusConverted
  github_com_florinel-chis_gophercrm_internal_models.Ticket:
    properties:
      assigned_to:

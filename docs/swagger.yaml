      per_page:
        type: integer
      request_id:
        type: string
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_florinel-chis_gophercrm_internal_utils.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIError'
      meta:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_utils.APIMeta'

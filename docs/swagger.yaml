      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_login_at:
        type: string
      last_name:
        type: string
      role:
        $ref: '#/definitions/github_com_florinel-chis_gophercrm_internal_models.UserRole'
      updated_at:
        type: string
